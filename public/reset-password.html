<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <meta name="theme-color" content="#082F6B">
    <meta name="application-name" content="Smart Fin 365">
    <meta name="description" content="Smart personal finance management, tracking and analytics.">
    <title>Reset Password | Smart Fin 365</title>
    <link rel="icon" type="image/png" href="assets/smart-fin-365-favicon.png">
    <link rel="apple-touch-icon" href="assets/smart-fin-365-icon-192.png">
    <link rel="stylesheet" href="styles.css">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  </head>
  <body class="auth-required">
    <section class="auth-gate">
      <form id="resetPasswordForm" class="auth-card">
        <div class="brand-mark auth-brand" aria-hidden="true">
          <img src="assets/smart-fin-365-logo.png" alt="Smart Fin 365">
        </div>
        <div>
          <p class="eyebrow">Secure recovery</p>
          <h1>Smart Fin 365</h1>
          <p class="auth-copy">Enter a new password for your Smart Fin 365 account.</p>
        </div>
        <label>
          New password
          <input id="newPassword" type="password" autocomplete="new-password" required>
        </label>
        <label>
          Confirm new password
          <input id="confirmPassword" type="password" autocomplete="new-password" required>
        </label>
        <button type="submit">Reset Password</button>
        <a class="link-button" href="/">Back to Sign In</a>
        <p id="resetStatus" class="message" role="status"></p>
      </form>
    </section>
    <script>
      const statusEl = document.querySelector("#resetStatus");
      const form = document.querySelector("#resetPasswordForm");
      const newPassword = document.querySelector("#newPassword");
      const confirmPassword = document.querySelector("#confirmPassword");

      function setStatus(message, color = "#475467") {
        statusEl.style.color = color;
        statusEl.textContent = message;
      }

      async function loadPublicStatus() {
        const response = await fetch("/api/auth/public-status", { cache: "no-store" });
        const data = await response.json().catch(() => ({}));
        if (!response.ok) throw new Error(data.error || "Could not read authentication settings.");
        if (!data.supabaseAuthConfigured) {
          throw new Error("Password recovery email could not be sent because email delivery has not been configured. Please configure an email provider in Settings.");
        }
        return data;
      }

      async function createSupabaseClient() {
        const data = await loadPublicStatus();
        return window.supabase.createClient(data.supabaseUrl, data.supabaseAnonKey);
      }

      form.addEventListener("submit", async (event) => {
        event.preventDefault();
        if (newPassword.value !== confirmPassword.value) {
          setStatus("New password and confirm password do not match.", "#b42318");
          return;
        }
        setStatus("Updating password...");
        try {
          const client = await createSupabaseClient();
          const { error } = await client.auth.updateUser({ password: newPassword.value });
          if (error) throw error;
          setStatus("Password reset successfully. Please sign in with your new password.", "#146c43");
          form.reset();
        } catch (error) {
          setStatus(error.message || "Unable to reset password.", "#b42318");
        }
      });
    </script>
  </body>
</html>
